<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Hashashin Electric</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0b0f;
        color: #eee;
        font-family: Arial, sans-serif;
      }
      body {
        display: grid;
        place-items: center;
        gap: 8px;
      }
      .ui { text-align: center; max-width: 96vw; }
      h1, p { margin: 4px 0; }
      h1 { font-size: 24px; }
      #game {
        border: 2px solid #333;
        background: #171717;
        cursor: crosshair;
        outline: none;
        max-width: 96vw;
        max-height: 70vh;
      }
      #restart {
        margin-top: 6px;
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        background: #f97316;
        color: #fff;
        font-weight: 700;
      }
      #status { min-height: 20px; color: #facc15; }
    </style>
  </head>
  <body>
    <div class="ui">
      <h1>Hashashin Electric</h1>
      <p>Move: E Up, D Down, S Left, F Right | Shoot: tap/click arena</p>
      <p>Score: <span id="score">0</span> | Health: <span id="health">100</span> | Gate: <span id="gate">Locked</span></p>
      <button id="restart" hidden>Restart</button>
      <p id="status">Find both electric switches. Enshiq waits near the shrine.</p>
    </div>

    <canvas id="game" width="720" height="420" tabindex="0" aria-label="Hashashin Electric game canvas"></canvas>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const scoreEl = document.getElementById('score');
      const healthEl = document.getElementById('health');
      const gateEl = document.getElementById('gate');
      const statusEl = document.getElementById('status');
      const restartBtn = document.getElementById('restart');

      const keys = {};
      let score = 0;
      let gameOver = false;
      let victory = false;

      const player = { x: 70, y: 330, r: 12, speed: 2.35, health: 100 };
      const fireballs = [];

      const shrine = { x: 64, y: 72, r: 22 };
      const enshiq = { x: 112, y: 72, r: 13 };

      const walls = [
        { x: 0, y: 0, w: 720, h: 18 },
        { x: 0, y: 402, w: 720, h: 18 },
        { x: 0, y: 0, w: 18, h: 420 },
        { x: 702, y: 0, w: 18, h: 420 },
        { x: 150, y: 95, w: 18, h: 250 },
        { x: 150, y: 95, w: 150, h: 18 },
        { x: 265, y: 190, w: 18, h: 155 },
        { x: 380, y: 55, w: 18, h: 200 },
        { x: 505, y: 220, w: 18, h: 145 },
        { x: 380, y: 55, w: 150, h: 18 },
      ];

      const gate = { x: 505, y: 120, w: 18, h: 100 };
      const exitZone = { x: 650, y: 148, w: 45, h: 90 };

      const switches = [
        { x: 215, y: 55, r: 14, active: false, name: 'North sign' },
        { x: 455, y: 345, r: 14, active: false, name: 'South sign' },
      ];

      const enemies = [
        { x: 225, y: 160, startX: 225, startY: 160, endX: 340, endY: 160, r: 13, speed: 1.05, alive: true, t: 0, dir: 1 },
        { x: 430, y: 115, startX: 430, startY: 115, endX: 610, endY: 115, r: 13, speed: 1.15, alive: true, t: 0, dir: 1 },
        { x: 575, y: 315, startX: 575, startY: 315, endX: 650, endY: 250, r: 13, speed: 1.05, alive: true, t: 0, dir: 1 },
      ];

      function isGateOpen() {
        return switches.every((s) => s.active);
      }

      function focusGame() { canvas.focus(); }
      focusGame();
      window.addEventListener('load', focusGame);
      document.body.addEventListener('pointerdown', focusGame);
      canvas.addEventListener('pointerdown', focusGame);

      function resetGame() {
        score = 0;
        gameOver = false;
        victory = false;
        player.x = 70;
        player.y = 330;
        player.health = 100;
        fireballs.length = 0;
        switches.forEach((s) => { s.active = false; });
        enemies.forEach((enemy, index) => {
          enemy.x = enemy.startX;
          enemy.y = enemy.startY;
          enemy.alive = true;
          enemy.t = 0;
          enemy.dir = 1;
        });
        for (const key of Object.keys(keys)) keys[key] = false;
        scoreEl.textContent = score;
        healthEl.textContent = player.health;
        gateEl.textContent = 'Locked';
        statusEl.textContent = 'Find both electric switches. Enshiq waits near the shrine.';
        restartBtn.hidden = true;
        focusGame();
      }

      function setKey(event, isDown) {
        const key = event.key.toLowerCase();
        keys[key] = isDown;
        if (['e', 's', 'd', 'f', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(key)) {
          event.preventDefault();
          event.stopPropagation();
        }
      }

      window.addEventListener('keydown', (event) => setKey(event, true), { capture: true });
      window.addEventListener('keyup', (event) => setKey(event, false), { capture: true });
      window.addEventListener('touchmove', (event) => event.preventDefault(), { passive: false });

      function shootAt(mx, my) {
        if (gameOver) return;
        const dx = mx - player.x;
        const dy = my - player.y;
        const len = Math.hypot(dx, dy) || 1;
        fireballs.push({ x: player.x, y: player.y, vx: (dx / len) * 5.2, vy: (dy / len) * 5.2, r: 5 });
      }

      canvas.addEventListener('pointerdown', (event) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        shootAt((event.clientX - rect.left) * scaleX, (event.clientY - rect.top) * scaleY);
      });

      restartBtn.addEventListener('click', resetGame);

      function circleRectHit(circle, rect) {
        const nearestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
        const nearestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
        return Math.hypot(circle.x - nearestX, circle.y - nearestY) < circle.r;
      }

      function blocked(x, y) {
        const circle = { x, y, r: player.r };
        const solidRects = isGateOpen() ? walls : walls.concat(gate);
        return solidRects.some((rect) => circleRectHit(circle, rect));
      }

      function movePlayer(dx, dy) {
        const nextX = player.x + dx;
        if (!blocked(nextX, player.y)) player.x = nextX;
        const nextY = player.y + dy;
        if (!blocked(player.x, nextY)) player.y = nextY;
      }

      function updatePlayer() {
        let dx = 0;
        let dy = 0;
        if (keys.e) dy -= player.speed;
        if (keys.d) dy += player.speed;
        if (keys.s) dx -= player.speed;
        if (keys.f) dx += player.speed;
        movePlayer(dx, dy);
      }

      function updateSwitches() {
        switches.forEach((sw) => {
          if (!sw.active && Math.hypot(player.x - sw.x, player.y - sw.y) < player.r + sw.r + 4) {
            sw.active = true;
            statusEl.textContent = `${sw.name} awakened. The circuit hums.`;
          }
        });
        gateEl.textContent = isGateOpen() ? 'Open' : 'Locked';
      }

      function moveEnemy(enemy) {
        const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
        let targetX;
        let targetY;

        if (distToPlayer < 145) {
          targetX = player.x;
          targetY = player.y;
        } else {
          enemy.t += 0.006 * enemy.dir;
          if (enemy.t >= 1) { enemy.t = 1; enemy.dir = -1; }
          if (enemy.t <= 0) { enemy.t = 0; enemy.dir = 1; }
          targetX = enemy.startX + (enemy.endX - enemy.startX) * enemy.t;
          targetY = enemy.startY + (enemy.endY - enemy.startY) * enemy.t;
        }

        const dx = targetX - enemy.x;
        const dy = targetY - enemy.y;
        const len = Math.hypot(dx, dy) || 1;
        enemy.x += (dx / len) * enemy.speed;
        enemy.y += (dy / len) * enemy.speed;

        if (distToPlayer < enemy.r + player.r) {
          player.health -= 0.35;
          healthEl.textContent = Math.max(0, Math.floor(player.health));
        }
      }

      function updateEnemies() {
        enemies.filter((enemy) => enemy.alive).forEach(moveEnemy);
        if (player.health <= 0) {
          gameOver = true;
          statusEl.textContent = 'Game Over. The guards overwhelmed you.';
          restartBtn.hidden = false;
        }
      }

      function updateFireballs() {
        fireballs.forEach((fireball) => {
          fireball.x += fireball.vx;
          fireball.y += fireball.vy;
        });

        for (let i = fireballs.length - 1; i >= 0; i--) {
          const fireball = fireballs[i];
          const out = fireball.x < -10 || fireball.x > canvas.width + 10 || fireball.y < -10 || fireball.y > canvas.height + 10;
          const hitWall = walls.some((rect) => circleRectHit(fireball, rect)) || (!isGateOpen() && circleRectHit(fireball, gate));
          if (out || hitWall) {
            fireballs.splice(i, 1);
            continue;
          }
          for (const enemy of enemies) {
            if (enemy.alive && Math.hypot(fireball.x - enemy.x, fireball.y - enemy.y) < fireball.r + enemy.r) {
              enemy.alive = false;
              fireballs.splice(i, 1);
              score += 1;
              scoreEl.textContent = score;
              statusEl.textContent = 'Guard dropped a hint: both signs must glow before the gate opens.';
              break;
            }
          }
        }
      }

      function updateStoryStatus() {
        if (Math.hypot(player.x - enshiq.x, player.y - enshiq.y) < 48) {
          statusEl.textContent = 'Enshiq: Power must flow through both signs before the gate wakes.';
        }
        if (isGateOpen() && !victory) {
          statusEl.textContent = 'The gate is open. Reach the gold exit zone.';
        }
        if (isGateOpen() && circleRectHit(player, exitZone)) {
          victory = true;
          gameOver = true;
          statusEl.textContent = 'Level clear. Shrine circuit restored.';
          restartBtn.hidden = false;
        }
      }

      function update() {
        if (gameOver) return;
        updatePlayer();
        updateSwitches();
        updateEnemies();
        updateFireballs();
        updateStoryStatus();
      }

      function drawRect(rect, color) {
        ctx.fillStyle = color;
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
      }

      function drawCircle(x, y, r, color) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }

      function drawText(text, x, y, color = '#e5e7eb') {
        ctx.fillStyle = color;
        ctx.font = '12px Arial';
        ctx.fillText(text, x, y);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawRect(exitZone, '#854d0e');
        drawText('EXIT', exitZone.x + 7, exitZone.y + 50, '#fef3c7');

        drawCircle(shrine.x, shrine.y, shrine.r, '#a855f7');
        drawText('Shrine', shrine.x - 20, shrine.y - 30, '#ddd6fe');
        drawCircle(enshiq.x, enshiq.y, enshiq.r, '#facc15');
        drawText('Enshiq', enshiq.x - 20, enshiq.y - 22, '#fde68a');

        walls.forEach((wall) => drawRect(wall, '#44403c'));
        if (!isGateOpen()) {
          drawRect(gate, '#fb923c');
          drawText('LOCKED', gate.x - 18, gate.y - 8, '#fed7aa');
        } else {
          ctx.strokeStyle = '#22c55e';
          ctx.lineWidth = 3;
          ctx.strokeRect(gate.x, gate.y, gate.w, gate.h);
          drawText('OPEN', gate.x - 10, gate.y - 8, '#bbf7d0');
        }

        switches.forEach((sw) => {
          drawCircle(sw.x, sw.y, sw.r, sw.active ? '#22c55e' : '#64748b');
          drawCircle(sw.x, sw.y, 5, sw.active ? '#bbf7d0' : '#cbd5e1');
        });

        enemies.forEach((enemy) => {
          if (enemy.alive) drawCircle(enemy.x, enemy.y, enemy.r, '#ef4444');
        });

        fireballs.forEach((fireball) => drawCircle(fireball.x, fireball.y, fireball.r, '#fb923c'));
        drawCircle(player.x, player.y, player.r, '#38bdf8');
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      requestAnimationFrame(loop);
    </script>
  </body>
</html>

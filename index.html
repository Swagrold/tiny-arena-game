<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Tiny Arena</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="ui">
      <h1>Tiny Arena</h1>
      <p>Move: On-screen buttons or E/D/S/F | Shoot: Tap/click arena</p>
      <p>Score: <span id="score">0</span> | Health: <span id="health">100</span></p>
      <button id="restart" hidden>Restart</button>
      <p id="status"></p>
    </div>

    <canvas id="game" width="640" height="400" tabindex="0" aria-label="Tiny Arena game canvas"></canvas>

    <div class="dpad" aria-label="Movement controls">
      <button id="move-up" class="control-btn up" type="button">▲</button>
      <button id="move-left" class="control-btn left" type="button">◀</button>
      <button id="move-down" class="control-btn down" type="button">▼</button>
      <button id="move-right" class="control-btn right" type="button">▶</button>
    </div>

    <script src="game.js"></script>
  </body>
</html>

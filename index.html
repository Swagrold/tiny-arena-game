<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Tiny Arena</title>
    <link rel="stylesheet" href="style.css?v=one-loop-2" />
  </head>
  <body>
    <div class="ui">
      <h1>Tiny Arena</h1>
      <p>Move: E Up, D Down, S Left, F Right | Shoot: tap/click arena</p>
      <p>Score: <span id="score">0</span> | Health: <span id="health">100</span></p>
      <p id="debug">ONE LOOP build loading...</p>
      <button id="restart" hidden>Restart</button>
      <p id="status"></p>
    </div>

    <canvas id="game" width="640" height="400" tabindex="0" aria-label="Tiny Arena game canvas"></canvas>

    <script src="game.js?v=one-loop-2"></script>
  </body>
</html>
